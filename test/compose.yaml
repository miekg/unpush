configs:
  app_compose:
    file: ./app.yaml
  unpush_config:
    file: ./config.yaml

services:
  unpush:
    image: unpush:latest
    volumes:
      - /run/uncloud/uncloud.sock:/run/uncloud/uncloud.sock
    configs:
      - source: app_compose
        target: /deploy/compose.yaml
      - source: unpush_config
        target: /deploy/config.yaml
    ports:
      - target: 8080
        published: 8080
        mode: host
    restart: always
