[settings]
experimental = true

[tools]
go = "1.26.1"
golangci-lint = "2.11.2"
pre-commit = "4.6.0"

[tasks.build]
description = "Build the unpush binary"
run = "go build -o unpush ."

[tasks.run]
description = "Run unpush"
run = "go run ."

[tasks."build:image"]
description = "Build the Docker image"
run = "docker build -t unpush ."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.test]
description = "Run tests"
run = "go test ./..."
